<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fad0c4, #ffd1ff);
            text-align: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: #ff1493;
            margin-bottom: 2rem;
        }
        .gallery {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .photo-card {
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .photo-card:hover {
            transform: scale(1.05);
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: linear-gradient(45deg, #ff1493, #8a2be2);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <h1>Our Beautiful Memories 📸</h1>

    <div class="gallery">
        <div class="photo-card"><img src="Images/shax1.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax2.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax3.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax4.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax5.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax6.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax7.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax8.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax9.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax10.jpeg" alt=""></div>
        <div class="photo-card"><img src="Images/shax11.jpeg" alt=""></div>
    </div>

    <button class="btn" onclick="window.location.href='letter.html'">
        Next Surprise 💌
    </button>

    <script>
        if (!sessionStorage.getItem("started")) {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
